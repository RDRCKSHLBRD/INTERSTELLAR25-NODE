<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>INTERSTELLAR PACKAGES</title>

  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/roderick.css">
  <link rel="stylesheet" href="/css/player.css">
  <link rel="stylesheet" href="/css/cart.css">
</head>

<body data-math="on" data-page="roderick">

  <!-- HEADER: artist name SVG only -->
  <header class="header-system" id="artistHeader">
    <div class="artist-name-container" id="artistName" data-position="artistName">
      <img id="artist-name-svg"
           src="/images/IP-ART-RODERICKSHOOLVRAID-flowerVase.svg"
           alt="Roderick Shoolbraid">
      <span id="artist-name" class="artist-name" style="display:none;">Roderick Shoolbraid</span>
    </div>
  </header>

  <!-- MAIN: album grid + sidebar -->
  <main id="artistMain">
    <div id="albumsRegion"></div>
    <aside id="infoRegion"></aside>
  </main>

  <!-- Mobile overlay (behind sidebar) -->
  <div id="mobileOverlay" class="mobile-overlay"></div>


  <!-- ══════════════════════════════════════════════════════════
       FOOTER V7 — Group-Based Architecture
       Five groups: transport, information, link, action, logo.
       footerQuadTree.js V7 positions all groups absolutely.
       player.js V7 builds controls into transport + information.
       ══════════════════════════════════════════════════════════ -->
 <!-- ══════════════════════════════════════════════════════════
     FOOTER V7.3 — Group-Based Architecture (Updated Groups)
     
     Five groups: transport, information, link, action, logo.
     footerQuadTree.js V7.2.1 positions all groups absolutely.
     player.js V7 builds controls into transport + information.
     
     V7.3 GROUP RECLASSIFICATION:
       link    = page navigation (downloads, film, contact)
       action  = in-app triggers (playlists sidebar, subscribe modal,
                 login/user, cart)
     ══════════════════════════════════════════════════════════ -->
<footer id="artistControls">
  <details class="footer-details" open>
    <summary>PLAYER I/O</summary>
    <div class="footer-bar">

      <!-- GROUP: Transport — player.js builds 9-col button grid here -->
      <div class="group-transport"></div>

      <!-- GROUP: Information — player.js builds title, seek, time, volume here -->
      <div class="group-information"></div>

      <!-- GROUP: Link — page navigation only -->
      <nav class="group-link">
        <a href="/downloads">downloads</a>
        <a href="/filmography">film</a>
        <a href="/contact">contact</a>
      </nav>

      <!-- GROUP: Action — in-app triggers (sidebars, modals, auth, cart) -->
      <div class="group-action">
        <button id="playlistsBtn" class="nav-action-btn" data-action="playlists">playlists</button>
        <button id="subscribeBtn" class="nav-action-btn" data-action="subscribe">subscribe</button>
        <button id="loginBtn" class="nav-login-btn">log in</button>
        <div id="userCell" class="user-cell">
          <a href="/account" class="user-cell-icon" title="Account">
            <img src="/images/IP-USER-candyFloss.svg" alt="Account" class="user-icon-img">
          </a>
          <span id="userName" class="user-cell-name"></span>
          <button id="logoutBtn" class="user-cell-logout">logout</button>
        </div>
        <button id="cartBtn" class="cart-button">
          <img src="/images/IP-CART25-m1.svg" alt="Cart" class="cart-icon">
          <span id="cartCount" class="cart-count hidden">0</span>
        </button>
      </div>

      <!-- GROUP: Logo — brand mark + tag -->
      <div class="group-logo">
        <img src="/images/IP_TAG24.svg" alt="Interstellar Packages">
        <span class="footer-tag">rdxenv 24/25/26</span>
      </div>

    </div>
  </details>
</footer>


  <!-- RODUX System -->
  <script type="module" src="/js/InterstellarSystem.js"></script>

  <!-- Auth + Cart (non-module, global) -->
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/player.js"></script>

  <!-- V7 page controller (imports footerQuadTree.js V7 internally) -->
  <script type="module" src="/js/roderick.js"></script>

  <!-- Overlays -->
  <section id="playerOverlay" aria-hidden="true" style="display:none;"></section>
  <section id="userOverlay" aria-hidden="true" style="display:none;"></section>

  <!-- Auth Modal -->
  <div id="authModal" class="auth-modal">
    <div class="auth-modal-content">
      <span class="close"></span>
      <div id="loginForm" class="auth-form-container">
        <h2>Log In</h2>
        <div id="loginError" class="auth-error form-hidden"></div>
        <form class="auth-form" id="loginFormElement">
          <input type="email" id="loginEmail" placeholder="Email" required>
          <div class="password-input-container">
            <input type="password" id="loginPassword" placeholder="Password" required>
            <div class="password-toggle-icon" data-target="loginPassword"></div>
          </div>
          <button type="submit" id="loginSubmit">Log In</button>
        </form>
        <div class="form-toggle">
          Don't have an account? <a id="showRegister">Create one</a>
        </div>
      </div>
      <div id="registerForm" class="auth-form-container form-hidden">
        <h2>Create Account</h2>
        <div id="registerError" class="auth-error form-hidden"></div>
        <div id="registerSuccess" class="auth-success form-hidden"></div>
        <form class="auth-form" id="registerFormElement">
          <input type="text" id="registerUsername" placeholder="Username" required>
          <input type="text" id="registerFirstName" placeholder="First Name">
          <input type="text" id="registerLastName" placeholder="Last Name">
          <input type="email" id="registerEmail" placeholder="Email" required>
          <div class="password-input-container">
            <input type="password" id="registerPassword" placeholder="Password (min 6 characters)" required>
            <div class="password-toggle-icon" data-target="registerPassword"></div>
          </div>
          <button type="submit" id="registerSubmit">Create Account</button>
        </form>
        <div class="form-toggle">
          Already have an account? <a id="showLogin">Log in</a>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
