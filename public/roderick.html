<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>INTERSTELLAR PACKAGES</title>
  <style>
    html, body { margin: 0; padding: 0; overflow-x: hidden; }
    body { background: #083D5E; color: #cadbda; font-family: Helvetica, sans-serif; opacity: 0; }
    * { box-sizing: border-box; }
  </style>
</head>

<body data-math="on" data-page="roderick">

  <!-- ── HEADER ──────────────────────────────────────────────── -->
  <header id="artistHeader">
    <div id="brandLogo" data-position="brandLogo">
      <img src="/images/IP_TAG24.svg" alt="Interstellar Packages">
    </div>
    <div id="artistName" data-position="artistName">
      <span id="artist-name">Roderick Shoolbraid</span>
    </div>
    <nav id="topNav" data-position="topNav">
      <a href="/filmography">Film</a>
      <a href="/contact">Contact</a>
      <button id="loginBtn">Log In</button>
      <button id="cartBtn">
        <img src="/images/IP-CART25-m1.svg" alt="Cart">
        <span id="cartCount"></span>
      </button>
    </nav>
  </header>

  <!-- ── MAIN ────────────────────────────────────────────────── -->
  <main id="artistMain">
    <div id="albumsRegion"></div>
    <aside id="infoRegion"></aside>
  </main>

  <!-- ── CONTROLS / PLAYER ───────────────────────────────────── -->
  <footer id="artistControls">
    <div id="playerControls" data-position="playerControls"></div>
  </footer>

  <!-- ── SCRIPTS ─────────────────────────────────────────────── -->
  <script type="module" src="/js/InterstellarSystem.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script type="module" src="/js/paint-applier.js"></script>
  <script type="module" src="/js/header.js"></script>
  <script type="module" src="/js/player.js"></script>
  <script type="module" src="/js/roderick.js"></script>

  <!-- ── AUTH MODAL (hidden) ─────────────────────────────────── -->
  <div id="authModal" style="display:none;">
    <div id="authModalContent">
      <span id="authClose"></span>
      <div id="loginForm">
        <h2>Log In</h2>
        <div id="loginError" style="display:none;"></div>
        <input type="email" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button id="loginSubmit">Log In</button>
        <p>No account? <a id="showRegister">Create one</a></p>
      </div>
      <div id="registerForm" style="display:none;">
        <h2>Create Account</h2>
        <div id="registerError" style="display:none;"></div>
        <div id="registerSuccess" style="display:none;"></div>
        <input type="text" id="registerUsername" placeholder="Username" required>
        <input type="text" id="registerFirstName" placeholder="First Name">
        <input type="text" id="registerLastName" placeholder="Last Name">
        <input type="email" id="registerEmail" placeholder="Email" required>
        <input type="password" id="registerPassword" placeholder="Password (min 6)" required>
        <button id="registerSubmit">Create Account</button>
        <p>Have an account? <a id="showLogin">Log in</a></p>
      </div>
    </div>
  </div>

</body>
</html>
