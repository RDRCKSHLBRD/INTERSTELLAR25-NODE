<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>INTERSTELLAR PACKAGES</title>
  <link rel="stylesheet" href="/css/roderick-styles.css">
</head>

<body data-math="on" data-page="roderick">

  <!-- ── HEADER: thin fixed bar ──────────────────────────────── -->
  <header class="ip-header" id="artistHeader">
    <div class="ip-header__logo" id="brandLogo" data-position="brandLogo">
      <img src="/images/IP_TAG24.svg" alt="Interstellar Packages">
    </div>

    <div class="ip-header__artist" id="artistName" data-position="artistName">
      <span id="artist-name">Roderick Shoolbraid</span>
    </div>

    <nav class="ip-header__nav" id="topNav" data-position="topNav">
      <a href="/filmography">Film</a>
      <a href="/contact">Contact</a>
      <button id="loginBtn" class="ip-btn ip-btn--outline">Log In</button>
      <span id="userInfo" class="ip-header__user" style="display:none;">
        <span id="userName"></span>
        <button id="logoutBtn" class="ip-btn ip-btn--outline">Logout</button>
      </span>
      <button id="cartBtn" class="ip-btn ip-btn--outline ip-btn--cart">
        <img src="/images/IP-CART25-m1.svg" alt="Cart" class="ip-cart-icon">
        <span id="cartCount" class="ip-cart-count" style="display:none;">0</span>
      </button>
    </nav>
  </header>

  <!-- ── MAIN: album grid + sidebar ──────────────────────────── -->
  <main class="ip-main" id="artistMain">
    <section class="ip-grid" id="albumsRegion">
      <!-- Album covers built by roderick.js -->
    </section>

    <aside class="ip-sidebar" id="infoRegion">
      <!-- Populated on album click -->
    </aside>
  </main>

  <!-- ── Mobile overlay (behind sidebar) ─────────────────────── -->
  <div class="ip-overlay" id="mobileOverlay"></div>

  <!-- ── PLAYER: fixed bottom bar ────────────────────────────── -->
  <footer class="ip-player-bar" id="artistControls">
    <div class="ip-player" id="playerControls">
      <!-- player.js builds its UI here -->
    </div>
    <span class="ip-player-bar__tag">&copy; 2024/25/26 RDXENV</span>
  </footer>

  <!-- ── Scripts ─────────────────────────────────────────────── -->
  <script type="module" src="/js/InterstellarSystem.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/player.js"></script>
  <script type="module" src="/js/paint-applier.js"></script>
  <script type="module" src="/js/header.js"></script>
  <script type="module" src="/js/roderick.js"></script>

  <!-- Overlays -->
  <section id="playerOverlay" aria-hidden="true" style="display:none;"></section>
  <section id="userOverlay" aria-hidden="true" style="display:none;"></section>

  <!-- Auth Modal -->
  <div id="authModal" class="ip-modal" style="display:none;">
    <div class="ip-modal__content">
      <span class="close"></span>
      <div id="loginForm" class="ip-modal__form">
        <h2>Log In</h2>
        <div id="loginError" class="ip-modal__error" style="display:none;"></div>
        <form id="loginFormElement">
          <input type="email" id="loginEmail" placeholder="Email" required>
          <div class="ip-modal__pw">
            <input type="password" id="loginPassword" placeholder="Password" required>
            <div class="password-toggle-icon" data-target="loginPassword"></div>
          </div>
          <button type="submit" id="loginSubmit" class="ip-btn">Log In</button>
        </form>
        <p class="ip-modal__toggle">Don't have an account? <a id="showRegister">Create one</a></p>
      </div>
      <div id="registerForm" class="ip-modal__form" style="display:none;">
        <h2>Create Account</h2>
        <div id="registerError" class="ip-modal__error" style="display:none;"></div>
        <div id="registerSuccess" class="ip-modal__success" style="display:none;"></div>
        <form id="registerFormElement">
          <input type="text" id="registerUsername" placeholder="Username" required>
          <input type="text" id="registerFirstName" placeholder="First Name">
          <input type="text" id="registerLastName" placeholder="Last Name">
          <input type="email" id="registerEmail" placeholder="Email" required>
          <div class="ip-modal__pw">
            <input type="password" id="registerPassword" placeholder="Password (min 6 chars)" required>
            <div class="password-toggle-icon" data-target="registerPassword"></div>
          </div>
          <button type="submit" id="registerSubmit" class="ip-btn">Create Account</button>
        </form>
        <p class="ip-modal__toggle">Already have an account? <a id="showLogin">Log in</a></p>
      </div>
    </div>
  </div>

</body>
</html>
