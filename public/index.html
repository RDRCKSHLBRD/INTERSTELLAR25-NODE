<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interstellar Packages</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:         #083D5E;
            --bg-deep:    #041e30;
            --fg:         #cadbda;
            --muted:      #8ab7ce;
            --primary:    #3AA0A0;
            --primaryHi:  #2b7f8c;
        }

        body {
            background: var(--bg-deep);
            color: var(--fg);
            font-family: Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #starfield {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        .nebula {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            background:
                radial-gradient(ellipse 80% 60% at 20% 80%, rgba(58, 160, 160, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse 60% 50% at 75% 20%, rgba(43, 127, 140, 0.04) 0%, transparent 60%);
        }

        .landing-shell {
            position: relative;
            z-index: 2;
            width: 100%; height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .artist-nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .artist-link {
            display: block;
            text-decoration: none;
            padding: 10px 24px;
            border: 1px solid transparent;
            border-radius: 2px;
            transition: border-color 0.4s ease, transform 0.3s ease;
            opacity: 0;
            transform: translateY(16px);
        }

        .artist-link.visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out,
                        border-color 0.4s ease;
        }

        .artist-link:hover {
            border-color: var(--primaryHi);
           
        }

        .artist-link img {
            display: block;
            height: 20px;
            width: auto;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .artist-link:hover img {
            opacity: 1;
        }

        /* Text fallback for artists without SVG */
        .artist-link--text {
            color: var(--muted);
            font-size: 15px;
            font-weight: 300;
            letter-spacing: 2.5px;
            text-transform: uppercase;
        }

        .ip-logo {
            position: fixed;
            bottom: 28px;
            right: 32px;
            z-index: 3;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 1s ease-out, transform 1s ease-out;
        }

        .ip-logo.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .ip-logo img {
            height: 32px;
            opacity: 0.35;
            transition: opacity 0.3s;
        }

        .ip-logo img:hover {
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            .artist-nav { gap: 14px; }
            .artist-link { padding: 8px 16px; }
            .artist-link img { height: 20px; }
            .ip-logo { bottom: 16px; right: 20px; }
            .ip-logo img { height: 24px; }
        }
    </style>
</head>
<body>

    <svg id="starfield" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="nebula"></div>

    <div class="landing-shell">
        <nav class="artist-nav" id="artistNav"></nav>
    </div>

    <div class="ip-logo" id="ipLogo">
        <img src="/images/IP_TAG24.svg" alt="Interstellar Packages">
    </div>

    <script src="/js/landing.js"></script>

</body>
</html>
