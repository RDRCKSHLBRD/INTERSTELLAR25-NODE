<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Loading... — Interstellar Packages</title>
  <link rel="stylesheet" href="/css/playerio.css">
  <style>
    /* ══════════════════════════════════════════════════════════
       CHARLOTTA — Lateral Album Environment
       
       The album cover is the door. Touch it, and the space
       opens. Horizontal scroll with snap. Each panel is a
       full-viewport room in the album's world.
       
       Palette injected as CSS vars from API. This CSS is
       palette-agnostic — colors come from :root overrides.
       
       Font: Futura PT Book (loaded from local assets)
       ══════════════════════════════════════════════════════════ */

    @font-face {
      font-family: 'Futura PT';
      src: local('FuturaPT-Book'), local('Futura PT Book');
      font-weight: 400;
      font-style: normal;
    }

    :root {
      /* Defaults — overridden by API palette */
      --c-bg: #620b1f;
      --c-text: #ffc0d7;
      --c-accent: #e2547c;
      --c-catalogue: #93163c;
      --c-track: #fe264f;
      --c-font: 'Futura PT', 'Avenir', 'Helvetica Neue', sans-serif;

      /* Layout */
      --footer-h: 0px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      overflow: hidden;
      height: 100%;
    }

    body {
      background: var(--c-bg);
      color: var(--c-text);
      font-family: var(--c-font);
      height: 100%;
      overflow: hidden;
    }


    /* ── Horizontal Scroll Container ─────────────────────── */

    .album-env {
      display: flex;
      width: max-content;
      height: calc(100vh - var(--footer-h));
      transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: transform;
    }

    .album-env.locked {
      /* Entry state: only panel 0 visible, no scroll */
      overflow: hidden;
    }


    /* ── Panel Base ──────────────────────────────────────── */

    .panel {
      width: 100vw;
      height: calc(100vh - var(--footer-h));
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }


    /* ══════════════════════════════════════════════════════
       PANEL 0 — THE DOOR (Cover)
       Full viewport. The cover image. Click to enter.
       ══════════════════════════════════════════════════════ */

    .panel-cover {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .panel-cover .cover-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    .panel-cover .cover-img.loaded {
      opacity: 1;
    }

    /* Entry prompt */
    .cover-prompt {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--c-text);
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0;
      animation: promptFade 3s ease 2s infinite;
      pointer-events: none;
    }

    @keyframes promptFade {
      0%, 100% { opacity: 0; }
      50% { opacity: 0.5; }
    }

    /* After entering, cover gets a subtle vignette */
    .panel-cover.entered .cover-prompt {
      display: none;
    }


    /* ══════════════════════════════════════════════════════
       PANEL 1 — LINER NOTES SPREAD
       Left: cover image. Right: text content.
       Matches the physical CD booklet layout.
       ══════════════════════════════════════════════════════ */

    .panel-liner {
      display: flex;
      background: var(--c-bg);
    }

    /* Left half — artwork */
    .liner-artwork {
      width: 56%;
      height: 100%;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .liner-artwork img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Artist name + album title overlay on artwork */
    .liner-artwork-overlay {
      position: absolute;
      top: 0;
      right: 0;
      padding: 40px 50px;
      text-align: right;
    }

    .liner-artist-name {
      font-size: clamp(1.8rem, 3.5vw, 3.2rem);
      font-weight: 400;
      color: var(--c-text);
      letter-spacing: 0.02em;
      line-height: 1.05;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 0.8s ease 0.3s, transform 0.8s ease 0.3s;
    }

    .liner-album-title {
      font-size: clamp(1.4rem, 2.5vw, 2.2rem);
      font-weight: 300;
      color: var(--c-accent);
      letter-spacing: 0.08em;
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 0.8s ease 0.5s, transform 0.8s ease 0.5s;
    }

    .panel-liner.revealed .liner-artist-name,
    .panel-liner.revealed .liner-album-title {
      opacity: 1;
      transform: translateY(0);
    }

    /* Right half — text content */
    .liner-text {
      flex: 1;
      padding: 40px 50px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow-y: auto;
      background: var(--c-bg);
    }

    /* Catalogue number */
    .liner-catalogue {
      font-size: 0.85rem;
      color: var(--c-catalogue);
      letter-spacing: 0.15em;
      margin-bottom: 16px;
    }

    /* Tracklist */
    .liner-tracklist {
      list-style: none;
      margin-bottom: auto;
    }

    .liner-track {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 8px 0;
      cursor: pointer;
      transition: color 0.2s;
    }

    .liner-track:hover {
      color: #fff;
    }

    .liner-track.playing {
      color: #fff;
    }

    .liner-track-name {
      font-size: clamp(0.95rem, 1.8vw, 1.3rem);
      color: var(--c-track);
      transition: color 0.2s;
    }

    .liner-track:hover .liner-track-name {
      color: #fff;
    }

    .liner-track.playing .liner-track-name {
      color: #fff;
    }

    .liner-track-dur {
      font-size: clamp(0.85rem, 1.5vw, 1.3rem);
      color: var(--c-track);
      padding-left: 24px;
      flex-shrink: 0;
    }

    /* Description block */
    .liner-description {
      margin-top: 40px;
      font-size: clamp(0.9rem, 1.5vw, 1.15rem);
      line-height: 1.7;
      color: var(--c-text);
      opacity: 0.9;
      max-width: 540px;
    }

    /* Credits */
    .liner-credits {
      margin-top: 40px;
      font-size: clamp(0.8rem, 1.3vw, 1.05rem);
      line-height: 1.7;
      color: var(--c-accent);
      opacity: 0.85;
    }


    /* ══════════════════════════════════════════════════════
       PANEL 2 — PURCHASE / ENVIRONMENT
       Minimal for now. Space for VEKTAAR later.
       ══════════════════════════════════════════════════════ */

    .panel-purchase {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--c-bg);
    }

    .purchase-card {
      text-align: center;
      max-width: 400px;
      padding: 60px;
    }

    .purchase-cover {
      width: 200px;
      height: 200px;
      object-fit: cover;
      margin-bottom: 32px;
      opacity: 0.9;
    }

    .purchase-title {
      font-size: 1.4rem;
      font-weight: 300;
      color: var(--c-text);
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .purchase-artist {
      font-size: 0.85rem;
      color: var(--c-catalogue);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .purchase-price {
      font-size: 1.5rem;
      color: var(--c-accent);
      margin-bottom: 32px;
    }

    .purchase-btn {
      padding: 14px 40px;
      background: transparent;
      border: 1px solid var(--c-accent);
      color: var(--c-accent);
      font-family: var(--c-font);
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
    }

    .purchase-btn:hover {
      background: var(--c-accent);
      color: var(--c-bg);
    }


    /* ── Navigation dots ─────────────────────────────────── */

    .panel-nav {
      position: fixed;
      bottom: calc(var(--footer-h) + 20px);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .panel-nav.visible {
      opacity: 1;
    }

    .panel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--c-catalogue);
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }

    .panel-dot.active {
      background: var(--c-track);
      transform: scale(1.3);
    }


    /* ── Back button ──────────────────────────────────────── */

    .album-back {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 200;
      color: var(--c-text);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      opacity: 0.4;
      transition: opacity 0.3s;
    }

    .album-back:hover { opacity: 1; }


    /* ── Mobile: stack vertical ───────────────────────────── */

    @media (max-width: 767px) {
      .panel-liner {
        flex-direction: column;
      }

      .liner-artwork {
        width: 100%;
        height: 45%;
      }

      .liner-text {
        padding: 24px 20px;
      }

      .liner-artwork-overlay {
        padding: 20px 24px;
      }

      .purchase-card {
        padding: 40px 24px;
      }
    }

    @media (max-width: 767px) and (orientation: portrait) {
      .liner-artwork {
        height: 40%;
      }
    }


    /* ── Loading state ────────────────────────────────────── */

    .album-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: var(--c-catalogue);
      font-size: 0.9rem;
      letter-spacing: 0.2em;
    }
  </style>
</head>
<body>

  <a href="/roderick.html" class="album-back" id="backBtn">← back</a>

  <div id="albumPage" class="album-loading">Loading...</div>

  <!-- Nav dots -->
  <div class="panel-nav" id="panelNav"></div>

  <!-- RODUX System -->
  <script type="module" src="/js/InterstellarSystem.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/playlists.js"></script>
  <script src="/js/player.js"></script>

  <!-- V8: PlayerIO panel (replaces footer) -->
  <script src="/js/playerIO.js"></script>

  <!-- Album controller (external module — no CSP hash needed) -->
  <script type="module" src="/js/album.js"></script>

  <!-- Auth Modal -->
  <div id="authModal" class="auth-modal">
    <div class="auth-modal-content">
      <span class="close"></span>
      <div id="loginForm" class="auth-form-container">
        <h2>Log In</h2>
        <div id="loginError" class="auth-error form-hidden"></div>
        <form class="auth-form" id="loginFormElement">
          <input type="email" id="loginEmail" placeholder="Email" required>
          <div class="password-input-container">
            <input type="password" id="loginPassword" placeholder="Password" required>
            <div class="password-toggle-icon" data-target="loginPassword"></div>
          </div>
          <button type="submit" id="loginSubmit">Log In</button>
        </form>
        <div class="form-toggle">
          Don't have an account? <a id="showRegister">Create one</a>
        </div>
      </div>
      <div id="registerForm" class="auth-form-container form-hidden">
        <h2>Create Account</h2>
        <div id="registerError" class="auth-error form-hidden"></div>
        <div id="registerSuccess" class="auth-success form-hidden"></div>
        <form class="auth-form" id="registerFormElement">
          <input type="text" id="registerUsername" placeholder="Username" required>
          <input type="text" id="registerFirstName" placeholder="First Name">
          <input type="text" id="registerLastName" placeholder="Last Name">
          <input type="email" id="registerEmail" placeholder="Email" required>
          <div class="password-input-container">
            <input type="password" id="registerPassword" placeholder="Password (min 6 characters)" required>
            <div class="password-toggle-icon" data-target="registerPassword"></div>
          </div>
          <button type="submit" id="registerSubmit">Create Account</button>
        </form>
        <div class="form-toggle">
          Already have an account? <a id="showLogin">Log in</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
