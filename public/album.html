<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Loading... — Interstellar Packages</title>
  <link rel="stylesheet" href="/css/player.css">
  <link rel="stylesheet" href="/css/cart.css">
  <style>
    /* ══════════════════════════════════════════════════════════
       CHARLOTTA — Lateral Album Environment
       
       The album cover is the door. Touch it, and the space
       opens. Horizontal scroll with snap. Each panel is a
       full-viewport room in the album's world.
       
       Palette injected as CSS vars from API. This CSS is
       palette-agnostic — colors come from :root overrides.
       
       Font: Futura PT Book (loaded from local assets)
       ══════════════════════════════════════════════════════════ */

    @font-face {
      font-family: 'Futura PT';
      src: local('FuturaPT-Book'), local('Futura PT Book');
      font-weight: 400;
      font-style: normal;
    }

    :root {
      /* Defaults — overridden by API palette */
      --c-bg: #620b1f;
      --c-text: #ffc0d7;
      --c-accent: #e2547c;
      --c-catalogue: #93163c;
      --c-track: #fe264f;
      --c-font: 'Futura PT', 'Avenir', 'Helvetica Neue', sans-serif;

      /* Layout */
      --footer-h: 65px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      overflow: hidden;
      height: 100%;
    }

    body {
      background: var(--c-bg);
      color: var(--c-text);
      font-family: var(--c-font);
      height: 100%;
      overflow: hidden;
    }


    /* ── Horizontal Scroll Container ─────────────────────── */

    .album-env {
      display: flex;
      width: max-content;
      height: calc(100vh - var(--footer-h));
      transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: transform;
    }

    .album-env.locked {
      /* Entry state: only panel 0 visible, no scroll */
      overflow: hidden;
    }


    /* ── Panel Base ──────────────────────────────────────── */

    .panel {
      width: 100vw;
      height: calc(100vh - var(--footer-h));
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }


    /* ══════════════════════════════════════════════════════
       PANEL 0 — THE DOOR (Cover)
       Full viewport. The cover image. Click to enter.
       ══════════════════════════════════════════════════════ */

    .panel-cover {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .panel-cover .cover-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    .panel-cover .cover-img.loaded {
      opacity: 1;
    }

    /* Entry prompt */
    .cover-prompt {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--c-text);
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0;
      animation: promptFade 3s ease 2s infinite;
      pointer-events: none;
    }

    @keyframes promptFade {
      0%, 100% { opacity: 0; }
      50% { opacity: 0.5; }
    }

    /* After entering, cover gets a subtle vignette */
    .panel-cover.entered .cover-prompt {
      display: none;
    }


    /* ══════════════════════════════════════════════════════
       PANEL 1 — LINER NOTES SPREAD
       Left: cover image. Right: text content.
       Matches the physical CD booklet layout.
       ══════════════════════════════════════════════════════ */

    .panel-liner {
      display: flex;
      background: var(--c-bg);
    }

    /* Left half — artwork */
    .liner-artwork {
      width: 56%;
      height: 100%;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .liner-artwork img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Artist name + album title overlay on artwork */
    .liner-artwork-overlay {
      position: absolute;
      top: 0;
      right: 0;
      padding: 40px 50px;
      text-align: right;
    }

    .liner-artist-name {
      font-size: clamp(1.8rem, 3.5vw, 3.2rem);
      font-weight: 400;
      color: var(--c-text);
      letter-spacing: 0.02em;
      line-height: 1.05;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 0.8s ease 0.3s, transform 0.8s ease 0.3s;
    }

    .liner-album-title {
      font-size: clamp(1.4rem, 2.5vw, 2.2rem);
      font-weight: 300;
      color: var(--c-accent);
      letter-spacing: 0.08em;
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 0.8s ease 0.5s, transform 0.8s ease 0.5s;
    }

    .panel-liner.revealed .liner-artist-name,
    .panel-liner.revealed .liner-album-title {
      opacity: 1;
      transform: translateY(0);
    }

    /* Right half — text content */
    .liner-text {
      flex: 1;
      padding: 40px 50px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow-y: auto;
      background: var(--c-bg);
    }

    /* Catalogue number */
    .liner-catalogue {
      font-size: 0.85rem;
      color: var(--c-catalogue);
      letter-spacing: 0.15em;
      margin-bottom: 16px;
    }

    /* Tracklist */
    .liner-tracklist {
      list-style: none;
      margin-bottom: auto;
    }

    .liner-track {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 8px 0;
      cursor: pointer;
      transition: color 0.2s;
    }

    .liner-track:hover {
      color: #fff;
    }

    .liner-track.playing {
      color: #fff;
    }

    .liner-track-name {
      font-size: clamp(0.95rem, 1.8vw, 1.3rem);
      color: var(--c-track);
      transition: color 0.2s;
    }

    .liner-track:hover .liner-track-name {
      color: #fff;
    }

    .liner-track.playing .liner-track-name {
      color: #fff;
    }

    .liner-track-dur {
      font-size: clamp(0.85rem, 1.5vw, 1.3rem);
      color: var(--c-track);
      padding-left: 24px;
      flex-shrink: 0;
    }

    /* Description block */
    .liner-description {
      margin-top: 40px;
      font-size: clamp(0.9rem, 1.5vw, 1.15rem);
      line-height: 1.7;
      color: var(--c-text);
      opacity: 0.9;
      max-width: 540px;
    }

    /* Credits */
    .liner-credits {
      margin-top: 40px;
      font-size: clamp(0.8rem, 1.3vw, 1.05rem);
      line-height: 1.7;
      color: var(--c-accent);
      opacity: 0.85;
    }


    /* ══════════════════════════════════════════════════════
       PANEL 2 — PURCHASE / ENVIRONMENT
       Minimal for now. Space for VEKTAAR later.
       ══════════════════════════════════════════════════════ */

    .panel-purchase {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--c-bg);
    }

    .purchase-card {
      text-align: center;
      max-width: 400px;
      padding: 60px;
    }

    .purchase-cover {
      width: 200px;
      height: 200px;
      object-fit: cover;
      margin-bottom: 32px;
      opacity: 0.9;
    }

    .purchase-title {
      font-size: 1.4rem;
      font-weight: 300;
      color: var(--c-text);
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .purchase-artist {
      font-size: 0.85rem;
      color: var(--c-catalogue);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .purchase-price {
      font-size: 1.5rem;
      color: var(--c-accent);
      margin-bottom: 32px;
    }

    .purchase-btn {
      padding: 14px 40px;
      background: transparent;
      border: 1px solid var(--c-accent);
      color: var(--c-accent);
      font-family: var(--c-font);
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
    }

    .purchase-btn:hover {
      background: var(--c-accent);
      color: var(--c-bg);
    }


    /* ── Navigation dots ─────────────────────────────────── */

    .panel-nav {
      position: fixed;
      bottom: calc(var(--footer-h) + 20px);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .panel-nav.visible {
      opacity: 1;
    }

    .panel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--c-catalogue);
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }

    .panel-dot.active {
      background: var(--c-track);
      transform: scale(1.3);
    }


    /* ── Back button ──────────────────────────────────────── */

    .album-back {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 200;
      color: var(--c-text);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }

    .album-back.visible {
      opacity: 0.5;
      pointer-events: auto;
    }

    .album-back:hover { opacity: 1; }


    /* ── Mobile: stack vertical ───────────────────────────── */

    @media (max-width: 767px) {
      .panel-liner {
        flex-direction: column;
      }

      .liner-artwork {
        width: 100%;
        height: 45%;
      }

      .liner-text {
        padding: 24px 20px;
      }

      .liner-artwork-overlay {
        padding: 20px 24px;
      }

      .purchase-card {
        padding: 40px 24px;
      }
    }

    @media (max-width: 767px) and (orientation: portrait) {
      .liner-artwork {
        height: 40%;
      }
    }


    /* ── Loading state ────────────────────────────────────── */

    .album-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: var(--c-catalogue);
      font-size: 0.9rem;
      letter-spacing: 0.2em;
    }
  </style>
</head>
<body>

  <a href="/roderick.html" class="album-back" id="backBtn">← back</a>

  <div id="albumPage" class="album-loading">Loading...</div>

  <!-- Nav dots -->
  <div class="panel-nav" id="panelNav"></div>

  <!-- Footer -->
  <footer id="artistControls">
    <details class="footer-details" open>
      <summary>PLAYER I/O</summary>
      <div class="footer-bar">
        <div class="group-transport"></div>
        <div class="group-information"></div>
        <nav class="group-link">
          <a href="/downloads">downloads</a>
          <a href="/filmography">film</a>
          <a href="/contact">contact</a>
        </nav>
        <div class="group-action">
          <button id="playlistsBtn" class="nav-action-btn" data-action="playlists">playlists</button>
          <button id="subscribeBtn" class="nav-action-btn" data-action="subscribe">subscribe</button>
          <button id="loginBtn" class="nav-login-btn">log in</button>
          <div id="userCell" class="user-cell">
            <a href="/account" class="user-cell-icon" title="Account">
              <img src="/images/IP-USER-candyFloss.svg" alt="Account" class="user-icon-img">
            </a>
            <span id="userName" class="user-cell-name"></span>
            <button id="logoutBtn" class="user-cell-logout">logout</button>
          </div>
          <button id="cartBtn" class="cart-button">
            <img src="/images/IP-CART25-m1.svg" alt="Cart" class="cart-icon">
            <span id="cartCount" class="cart-count hidden">0</span>
          </button>
        </div>
        <div class="group-logo">
          <img src="/images/IP_TAG24.svg" alt="Interstellar Packages">
          <span class="footer-tag">rdxenv 24/25/26</span>
        </div>
      </div>
    </details>
  </footer>

  <!-- RODUX System -->
  <script type="module" src="/js/InterstellarSystem.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/playlists.js"></script>
  <script src="/js/player.js"></script>

  <script type="module">
    import { FooterQuadTree } from '/js/footerQuadTree.js';

    // ── Extract catalogue from URL ────────────────────────────
    const pathParts = window.location.pathname.split('/');
    const catalogue = pathParts[pathParts.length - 1];

    if (!catalogue) {
      document.getElementById('albumPage').textContent = 'No album specified.';
      throw new Error('No catalogue in URL');
    }

    // ── Fetch album data ──────────────────────────────────────
    const res = await fetch(`/api/albums/catalogue/${catalogue}`);
    if (!res.ok) {
      document.getElementById('albumPage').textContent = 'Album not found.';
      throw new Error(`Album ${catalogue} not found`);
    }

    const json = await res.json();
    const album = json.data;

    // ── Apply palette ─────────────────────────────────────────
    const root = document.documentElement;
    if (album.palette) {
      if (album.palette.bg)         root.style.setProperty('--c-bg', album.palette.bg);
      if (album.palette.text)       root.style.setProperty('--c-text', album.palette.text);
      if (album.palette.accent)     root.style.setProperty('--c-accent', album.palette.accent);
      if (album.palette.catalogue)  root.style.setProperty('--c-catalogue', album.palette.catalogue);
      if (album.palette.trackTitle) root.style.setProperty('--c-track', album.palette.trackTitle);
    }

    document.title = `${album.name} — ${album.artist_name} — Interstellar Packages`;

    const coverUrl = album.cover_url || `/api/image/${album.catalogue}/cover.jpg`;

    // ── Duration formatter ────────────────────────────────────
    function fmtDur(d) {
      if (!d) return '';
      if (String(d).includes(':')) return d;
      const sec = parseInt(d);
      return `${Math.floor(sec / 60)}:${String(sec % 60).padStart(2, '0')}`;
    }

    // ── Build the environment ─────────────────────────────────
    const page = document.getElementById('albumPage');
    page.className = 'album-env locked';

    const songs = album.songs || [];

    page.innerHTML = `
      <!-- PANEL 0: The Door -->
      <section class="panel panel-cover" id="panelCover">
        <img class="cover-img" src="${coverUrl}" alt="${album.name}" />
        <div class="cover-prompt">enter</div>
      </section>

      <!-- PANEL 1: Liner Notes Spread -->
      <section class="panel panel-liner" id="panelLiner">
        <div class="liner-artwork">
          <img src="${coverUrl}" alt="${album.name}" />
          <div class="liner-artwork-overlay">
            <div class="liner-artist-name">${album.artist_name}</div>
            <div class="liner-album-title">${album.name}</div>
          </div>
        </div>
        <div class="liner-text">
          <div>
            <div class="liner-catalogue">${album.catalogue}</div>
            <ul class="liner-tracklist">
              ${songs.map(s => `
                <li class="liner-track" data-song-id="${s.id}" data-album-id="${album.id}">
                  <span class="liner-track-name">${s.name}</span>
                  <span class="liner-track-dur">${fmtDur(s.duration)}</span>
                </li>
              `).join('')}
            </ul>
          </div>

          <div class="liner-description">
            ${album.description || 'The debut ambient electronic album by Roderick Shoolbraid, written in a span from 2003 to 2005. Released in 2010. A soundtrack for a dream, and a film that never was.'}
          </div>

          <div class="liner-credits">
            ${album.credit || `All Sound &amp; Composition: ${album.artist_name}.<br>Cover Art, Photography &amp; Design: ${album.artist_name}.<br>©All Rights Reserved.`}
          </div>
        </div>
      </section>

      <!-- PANEL 2: Purchase / Environment -->
      <section class="panel panel-purchase" id="panelPurchase">
        <div class="purchase-card">
          <img class="purchase-cover" src="${coverUrl}" alt="${album.name}" />
          <div class="purchase-title">${album.name}</div>
          <div class="purchase-artist">${album.artist_name}</div>
          ${album.product ? `
            <div class="purchase-price">$${album.product.price?.toFixed(2) || '12.00'}</div>
            <button class="purchase-btn" data-catalogue="${album.catalogue}">Add to Cart</button>
          ` : ''}
        </div>
      </section>
    `;


    // ══════════════════════════════════════════════════════════
    // NAVIGATION ENGINE
    // ══════════════════════════════════════════════════════════

    let currentPanel = 0;
    const totalPanels = 3;
    let entered = false;

    const env = document.getElementById('albumPage');
    const nav = document.getElementById('panelNav');
    const backBtn = document.getElementById('backBtn');
    const panelCover = document.getElementById('panelCover');
    const panelLiner = document.getElementById('panelLiner');

    // Build nav dots
    for (let i = 0; i < totalPanels; i++) {
      const dot = document.createElement('div');
      dot.className = 'panel-dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => goToPanel(i));
      nav.appendChild(dot);
    }

    function goToPanel(idx) {
      if (idx < 0 || idx >= totalPanels) return;
      if (!entered && idx > 0) return;

      currentPanel = idx;
      env.style.transform = `translateX(-${idx * 100}vw)`;

      // Update dots
      nav.querySelectorAll('.panel-dot').forEach((d, i) => {
        d.classList.toggle('active', i === idx);
      });
    }

    // ── Entry interaction ─────────────────────────────────────
    panelCover.addEventListener('click', () => {
      if (entered) return;
      entered = true;
      env.classList.remove('locked');
      panelCover.classList.add('entered');
      nav.classList.add('visible');
      backBtn.classList.add('visible');

      // Slide to liner notes
      goToPanel(1);

      // Trigger reveal animations on liner panel
      setTimeout(() => {
        panelLiner.classList.add('revealed');
      }, 400);
    });

    // ── Cover image load ──────────────────────────────────────
    const coverImg = panelCover.querySelector('.cover-img');
    if (coverImg) {
      if (coverImg.complete) {
        coverImg.classList.add('loaded');
      } else {
        coverImg.addEventListener('load', () => coverImg.classList.add('loaded'));
      }
    }


    // ── Keyboard navigation ───────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

      switch (e.key) {
        case 'ArrowRight':
          e.preventDefault();
          if (!entered) { panelCover.click(); return; }
          goToPanel(currentPanel + 1);
          break;
        case 'ArrowLeft':
          e.preventDefault();
          goToPanel(currentPanel - 1);
          break;
        case ' ':
          e.preventDefault();
          if (!entered) { panelCover.click(); return; }
          if (window.audioPlayer?.audio) {
            window.audioPlayer.audio.paused ? window.audioPlayer.play() : window.audioPlayer.pause();
          }
          break;
        case 'Escape':
          e.preventDefault();
          goToPanel(0);
          break;
      }
    });

    // ── Wheel / swipe navigation ──────────────────────────────
    let wheelCooldown = false;

    env.addEventListener('wheel', (e) => {
      if (wheelCooldown) return;

      // Use deltaX for horizontal scroll, deltaY for vertical (trackpad)
      const delta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;

      if (Math.abs(delta) < 30) return;

      wheelCooldown = true;
      setTimeout(() => { wheelCooldown = false; }, 800);

      if (!entered && delta > 0) {
        panelCover.click();
        return;
      }

      if (delta > 0) {
        goToPanel(currentPanel + 1);
      } else {
        goToPanel(currentPanel - 1);
      }
    }, { passive: true });

    // Touch swipe
    let touchStartX = 0;
    let touchStartY = 0;

    env.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    env.addEventListener('touchend', (e) => {
      const dx = touchStartX - e.changedTouches[0].clientX;
      const dy = touchStartY - e.changedTouches[0].clientY;

      // Require mostly horizontal swipe
      if (Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx)) return;

      if (!entered && dx > 0) {
        panelCover.click();
        return;
      }

      if (dx > 0) {
        goToPanel(currentPanel + 1);
      } else {
        goToPanel(currentPanel - 1);
      }
    }, { passive: true });


    // ── Track click → play ────────────────────────────────────
    document.querySelectorAll('.liner-track').forEach(track => {
      track.addEventListener('click', () => {
        const songId = track.dataset.songId;
        const albumId = track.dataset.albumId;
        if (window.audioPlayer) {
          window.audioPlayer.playSong(songId, albumId);
        }
        document.querySelectorAll('.liner-track').forEach(t => t.classList.remove('playing'));
        track.classList.add('playing');
      });
    });

    // ── Purchase button → cart ────────────────────────────────
    const purchaseBtn = document.querySelector('.purchase-btn');
    if (purchaseBtn) {
      purchaseBtn.addEventListener('click', () => {
        if (window.cartManager) {
          window.cartManager.addAlbumToCart(purchaseBtn.dataset.catalogue);
        }
      });
    }

    // ── Playlists sidebar wiring ──────────────────────────────
    const playlistsBtn = document.getElementById('playlistsBtn');
    if (playlistsBtn) {
      playlistsBtn.addEventListener('click', () => {
        if (window.playlistManager) window.playlistManager.toggle();
      });
    }


    // ── Footer QuadTree ───────────────────────────────────────
    const fqt = new FooterQuadTree();
    await fqt.init();
    window.footerQT = fqt;

    // Update footer height var
    function syncFooterHeight() {
      const fh = document.getElementById('artistControls')?.offsetHeight || 65;
      root.style.setProperty('--footer-h', `${fh}px`);
    }

    function render() {
      if (window.footerQT) window.footerQT.layout();
      syncFooterHeight();
    }

    let resizeTimer;
    addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(render, 80);
    });

    // Footer toggle recalc
    const footerDetails = document.querySelector('.footer-details');
    if (footerDetails) {
      footerDetails.addEventListener('toggle', () => {
        setTimeout(render, 60);
      });
    }

    render();
    document.body.classList.add('ready');

    console.log(`✅ Charlotta environment: ${album.name} (${catalogue}) — ${totalPanels} panels`);
  </script>
</body>
</html>
